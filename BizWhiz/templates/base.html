<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}BizWhiz{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0c0e14;
      --surface:     #12151f;
      --card:        #181c28;
      --border:      #232639;
      --border-lt:   #2d3148;
      --text:        #d4d8eb;
      --muted:       #7a8099;
      --accent:      #4f7bff;
      --accent-dk:   #3d69f5;
      --accent-glow: rgba(79,123,255,.2);
      --green:       #22c55e;
      --orange:      #f97316;
      --red:         #ef4444;
      --yellow:      #eab308;
      --purple:      #a855f7;
      --cyan:        #06b6d4;
      --sidebar-w:   224px;
      --r-sm:  6px;
      --r:     10px;
      --r-lg:  14px;
      --r-xl:  18px;
    }

    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Sidebar ────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; height: 100vh;
      z-index: 100;
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: .6rem;
      padding: 1.2rem 1.1rem 1.1rem;
      text-decoration: none;
      border-bottom: 1px solid var(--border);
    }
    .brand-icon {
      width: 30px; height: 30px;
      background: var(--accent);
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 800; color: #fff; flex-shrink: 0;
      letter-spacing: -.5px;
    }
    .brand-name { font-size: 1rem; font-weight: 800; color: #fff; letter-spacing: -.3px; }
    .brand-name em { color: var(--accent); font-style: normal; }

    .sidebar-nav {
      flex: 1; padding: .6rem .6rem;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 1px;
    }
    .nav-section-label {
      font-size: .63rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
      padding: .6rem .6rem .2rem; margin-top: .25rem;
    }
    .nav-item {
      display: flex; align-items: center; gap: .55rem;
      padding: .5rem .7rem;
      color: var(--muted);
      text-decoration: none;
      font-size: .85rem; font-weight: 500;
      border-radius: var(--r-sm);
      transition: background .12s, color .12s;
    }
    .nav-item i { font-size: .9rem; width: 16px; text-align: center; flex-shrink: 0; }
    .nav-item:hover { background: rgba(255,255,255,.05); color: var(--text); }
    .nav-item.active { background: rgba(79,123,255,.12); color: #7fa5ff; }
    .nav-item.active i { color: var(--accent); }

    .sidebar-footer {
      padding: .8rem .9rem;
      border-top: 1px solid var(--border);
    }
    .user-block { display: flex; align-items: center; gap: .55rem; margin-bottom: .6rem; }
    .avatar {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .72rem; color: #fff; flex-shrink: 0;
    }
    .user-info { min-width: 0; flex: 1; }
    .user-name { font-size: .8rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-plan {
      font-size: .68rem; color: var(--muted);
      background: rgba(255,255,255,.06); border-radius: 20px;
      padding: .05rem .4rem; display: inline-block; margin-top: .1rem;
    }
    .btn-logout {
      display: flex; align-items: center; gap: .4rem;
      color: var(--muted); text-decoration: none;
      font-size: .78rem; font-weight: 500;
      padding: .3rem .4rem; border-radius: var(--r-sm);
      transition: color .15s, background .15s;
    }
    .btn-logout:hover { color: var(--red); background: rgba(239,68,68,.08); }

    /* ── Main ────────────────────────────────────────── */
    .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: .85rem 1.75rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50; gap: 1rem;
    }
    .topbar-title { font-size: .95rem; font-weight: 700; color: #fff; }

    .content { padding: 1.75rem; flex: 1; }

    /* ── Cards ───────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 1.25rem;
    }
    .card-title {
      font-size: .875rem; font-weight: 700; color: #fff;
      margin-bottom: 1rem;
    }

    /* ── Alerts ──────────────────────────────────────── */
    .alert {
      border-radius: var(--r);
      padding: .6rem 1rem;
      margin-bottom: .875rem;
      font-size: .85rem;
    }
    .alert-danger  { background: rgba(239,68,68,.1);  border: 1px solid rgba(239,68,68,.25);  color: #fca5a5; }
    .alert-success { background: rgba(34,197,94,.1);  border: 1px solid rgba(34,197,94,.25);  color: #86efac; }
    .alert-warning { background: rgba(234,179,8,.1);  border: 1px solid rgba(234,179,8,.25);  color: #fde047; }
    .alert-info    { background: rgba(6,182,212,.1);  border: 1px solid rgba(6,182,212,.25);  color: #67e8f9; }

    /* ── Buttons ─────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .45rem 1rem;
      border-radius: var(--r-sm);
      font-size: .825rem; font-weight: 600;
      text-decoration: none; border: none; cursor: pointer;
      transition: all .15s; white-space: nowrap; font-family: inherit;
    }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dk); }
    .btn-secondary {
      background: rgba(255,255,255,.06);
      color: var(--text);
      border: 1px solid var(--border-lt);
    }
    .btn-secondary:hover { background: rgba(255,255,255,.1); border-color: #3d4160; }
    .btn-danger   { background: rgba(239,68,68,.1); color: #fca5a5; border: 1px solid rgba(239,68,68,.2); }
    .btn-danger:hover { background: rgba(239,68,68,.2); }
    .btn-sm       { padding: .3rem .65rem; font-size: .775rem; }
    .btn-ghost    { background: transparent; color: var(--muted); border: none; }
    .btn-ghost:hover { color: var(--text); background: rgba(255,255,255,.05); }

    /* ── Tables ──────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    th {
      color: var(--muted); font-size: .7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .07em;
      padding: .6rem 1rem; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: .75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: .875rem; vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,.02); }

    /* ── Forms ───────────────────────────────────────── */
    .form-control, .form-select {
      background: var(--bg);
      border: 1px solid var(--border-lt);
      border-radius: var(--r-sm);
      color: var(--text);
      padding: .5rem .85rem;
      font-size: .875rem; font-family: inherit;
      outline: none; width: 100%;
      transition: border-color
