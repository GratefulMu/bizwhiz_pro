{% extends "auth_base.html" %}
{% block title %}Sign In{% endblock %}
{% block brand_tagline %}Welcome back{% endblock %}

{% block card_content %}
<h2>Sign in to BizWhiz</h2>

<form method="POST" action="{{ url_for('auth.login') }}{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
  <div class="mb-3">
    <label class="form-label" for="email">Email address</label>
    <input type="email" id="email" name="email" class="form-control"
           value="{{ email or '' }}" placeholder="you@company.com" required autofocus>
  </div>

  <div class="mb-3">
    <div class="d-flex justify-content-between align-items-center mb-1">
      <label class="form-label" for="password" style="margin-bottom:0;">Password</label>
      <a href="{{ url_for('auth.forgot_password') }}"
         style="font-size:.78rem;color:var(--accent);text-decoration:none;">
        Forgot password?
      </a>
    </div>
    <div class="pw-wrap">
      <input type="password" id="password" name="password" class="form-control"
             placeholder="Password" required>
      <button type="button" class="pw-toggle" onclick="togglePw('password',this)" tabindex="-1">
        <i class="bi bi-eye"></i>
      </button>
    </div>
  </div>

  <div class="mb-3 form-check">
    <input class="form-check-input" type="checkbox" id="remember" name="remember" value="1">
    <label class="form-check-label" for="remember">Remember me for 30 days</label>
  </div>

  <button type="submit" class="btn-auth">Sign in</button>
</form>

<div class="auth-links">
  Don't have an account?
  <a href="{{ url_for('auth.choose_plan') }}">View plans &amp; sign up</a>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePw(fieldId, btn) {
  const f = document.getElementById(fieldId);
  const show = f.type === 'password';
  f.type = show ? 'text' : 'password';
  btn.innerHTML = show ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
}
</script>
