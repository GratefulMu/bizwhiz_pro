{% extends "auth_base.html" %}
{% block title %}Reset Password{% endblock %}
{% block brand_tagline %}Choose a new password{% endblock %}

{% block card_content %}
<h2>Set new password</h2>
<form method="POST">
  <div class="mb-3">
    <label class="form-label" for="password">New password</label>
    <div class="pw-wrap">
      <input type="password" id="password" name="password" class="form-control"
             placeholder="At least 8 characters" required minlength="8" autofocus>
      <button type="button" class="pw-toggle" onclick="togglePw('password',this)" tabindex="-1">
        <i class="bi bi-eye"></i>
      </button>
    </div>
    <div id="pw-strength" style="height:4px;border-radius:4px;margin-top:6px;background:#2a2d3e;overflow:hidden;">
      <div id="pw-bar" style="height:100%;width:0;transition:width .3s,background .3s;border-radius:4px;"></div>
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label" for="confirm_password">Confirm password</label>
    <div class="pw-wrap">
      <input type="password" id="confirm_password" name="confirm_password" class="form-control"
             placeholder="Repeat password" required>
      <button type="button" class="pw-toggle" onclick="togglePw('confirm_password',this)" tabindex="-1">
        <i class="bi bi-eye"></i>
      </button>
    </div>
    <div id="match-msg" style="font-size:.8rem;margin-top:4px;min-height:1rem;"></div>
  </div>
  <button type="submit" class="btn-auth">Update password</button>
</form>
{% endblock %}

{% block scripts %}
<script>
function togglePw(fieldId, btn) {
  const f = document.getElementById(fieldId);
  const show = f.type === 'password';
  f.type = show ? 'text' : 'password';
  btn.innerHTML = show ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
}
const pwInput   = document.getElementById('password');
const pwBar     = document.getElementById('pw-bar');
const confInput = document.getElementById('confirm_password');
const matchMsg  = document.getElementById('match-msg');
pwInput.addEventListener('input', () => {
  const v = pwInput.value;
  let score = 0;
  if (v.length >= 8)  score++;
  if (v.length >= 12) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const pct   = Math.min(score / 4 * 100, 100);
  const color = score <= 1 ? '#dc3545' : score <= 2 ? '#fd7e14' : score <= 3 ? '#ffc107' : '#198754';
  pwBar.style.width = pct + '%';
  pwBar.style.background = color;
  checkMatch();
});
confInput.addEventListener('input', checkMatch);
function checkMatch() {
  if (!confInput.value) { matchMsg.textContent = ''; return; }
  if (confInput.value === pwInput.value) {
    matchMsg.style.color = '#a3d9a5'; matchMsg.textContent = 'Passwords match';
  } else {
    matchMsg.style.color = '#f4b8be'; matchMsg.textContent = 'Passwords do not match';
  }
}
</script>
{% endblock %}
